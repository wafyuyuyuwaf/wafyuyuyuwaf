<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指定透明图像生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
        }
        .app {
            background: #fff; padding: 35px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); max-width: 440px; width: 100%;
            text-align: center;
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 25px; color: #1a1a1a; }

        .upload-box {
            border: 2px dashed #e0e0e0; border-radius: 16px; padding: 30px 10px;
            margin-bottom: 20px; cursor: pointer; position: relative;
            transition: all 0.3s;
        }
        .upload-box:hover { border-color: #007aff; background: #f8f9fa; }
        .upload-box input[type="file"] {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer;
        }
        #preview-img { max-width: 120px; border-radius: 8px; display: none; margin: 0 auto; }
        .upload-text { color: #8e8e93; font-size: 14px; margin-top: 10px; }

        .btn {
            width: 100%; padding: 14px; background: #007aff; color: #fff; border: none;
            border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: background 0.2s; margin-top: 10px;
        }
        .btn:hover:not(:disabled) { background: #0066d9; }
        .btn:disabled { background: #aac9f5; cursor: not-allowed; }

        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #result-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; display: none; }
        
        #preview-result {
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #result-img { width: 100%; max-width: 260px; display: block; }
        
        #download-btn { background: #34c759; margin-top: 0; }
        #download-btn:hover { background: #2a9d44; }
    </style>
</head>
<body>
    <div class="app">
        <h1>指定透明图像生成</h1>
        
        <div class="upload-box">
            <input type="file" id="fileInput" accept="image/*">
            <img id="preview-img">
            <div class="upload-text">点击选择图片</div>
        </div>

        <button class="btn" id="generateBtn" disabled>
            <div class="spinner" id="spinner"></div>
            <span id="btnText">生成图标</span>
        </button>

        <div id="result-section">
            <div id="preview-result">
                <img id="result-img">
            </div>
            <button class="btn" id="downloadBtn">保存 PNG</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('preview-img');
        const generateBtn = document.getElementById('generateBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const resultSection = document.getElementById('result-section');
        const resultImg = document.getElementById('result-img');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedFile = null;

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                selectedFile = this.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    generateBtn.disabled = false;
                    resultSection.style.display = 'none';
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        generateBtn.addEventListener('click', () => {
            generateBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = '生成中...';

            setTimeout(() => {
                const img = new Image();
                img.onload = () => {
                    const size = 1024; 

                    // --- 几何比例参数 ---
                    const outerBoxRatio = 0.75; 
                    const outerBoxSize = size * outerBoxRatio;
                    const outerBoxOffset = (size - outerBoxSize) / 2;
                    
                    const radius = 120; 

                    // 保留缩小后的图片比例
                    const innerBoxRatio = 0.75; 
                    
                    const innerBoxSize = outerBoxSize * innerBoxRatio;
                    const innerBoxOffset = (size - innerBoxSize) / 2;

                    // --- 极黑阴影参数 ---
                    const deepBlackOuter = 'rgba(0, 0, 0, 0.95)'; 
                    const deepBlackInner = 'rgba(0, 0, 0, 0.90)'; 

                    // 1. 外层阴影 (恢复之前的偏移距离，不再飞得太远)
                    const outerShadowBlur = 70;     // 略微收紧模糊度
                    const outerShadowX = -60;       // 从-120收回到-60
                    const outerShadowY = 60;        // 从120收回到60

                    // 2. 内层阴影 (保持小范围、紧贴图片)
                    const innerShadowBlur = 25;   
                    const innerShadowX = -20;     
                    const innerShadowY = 20;

                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');

                    // 1. 清除成 100% 透明背景
                    ctx.clearRect(0, 0, size, size);

                    // 2. 渲染外层大阴影
                    ctx.shadowColor = deepBlackOuter;
                    ctx.shadowBlur = outerShadowBlur;
                    ctx.shadowOffsetX = outerShadowX;
                    ctx.shadowOffsetY = outerShadowY;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath(); ctx.moveTo(outerBoxOffset + radius, outerBoxOffset); ctx.quadraticCurveTo(outerBoxOffset + outerBoxSize, outerBoxOffset, outerBoxOffset + outerBoxSize, outerBoxOffset + radius); ctx.quadraticCurveTo(outerBoxOffset + outerBoxSize, outerBoxOffset + outerBoxSize, outerBoxOffset + outerBoxSize - radius, outerBoxOffset + outerBoxSize); ctx.quadraticCurveTo(outerBoxOffset, outerBoxOffset + outerBoxSize, outerBoxOffset, outerBoxOffset + outerBoxSize - radius); ctx.quadraticCurveTo(outerBoxOffset, outerBoxOffset, outerBoxOffset + radius, outerBoxOffset); ctx.closePath(); ctx.fill();
                    
                    // 镂空去掉白底
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.shadowColor = 'transparent';
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath(); ctx.moveTo(outerBoxOffset + radius, outerBoxOffset); ctx.quadraticCurveTo(outerBoxOffset + outerBoxSize, outerBoxOffset, outerBoxOffset + outerBoxSize, outerBoxOffset + radius); ctx.quadraticCurveTo(outerBoxOffset + outerBoxSize, outerBoxOffset + outerBoxSize, outerBoxOffset + outerBoxSize - radius, outerBoxOffset + outerBoxSize); ctx.quadraticCurveTo(outerBoxOffset, outerBoxOffset + outerBoxSize, outerBoxOffset, outerBoxOffset + outerBoxSize - radius); ctx.quadraticCurveTo(outerBoxOffset, outerBoxOffset, outerBoxOffset + radius, outerBoxOffset); ctx.closePath(); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';

                    // 3. 渲染内层图片与贴边小阴影
                    const innerCanvas = document.createElement('canvas');
                    innerCanvas.width = size;
                    innerCanvas.height = size;
                    const innerCtx = innerCanvas.getContext('2d');

                    innerCtx.shadowColor = deepBlackInner;
                    innerCtx.shadowBlur = innerShadowBlur;
                    innerCtx.shadowOffsetX = innerShadowX;
                    innerCtx.shadowOffsetY = innerShadowY;
                    innerCtx.fillStyle = '#FFFFFF';
                    innerCtx.beginPath(); innerCtx.moveTo(innerBoxOffset + radius, innerBoxOffset); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset + radius); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize - radius, innerBoxOffset + innerBoxSize); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize - radius); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset, innerBoxOffset + radius, innerBoxOffset); innerCtx.closePath(); innerCtx.fill();

                    innerCtx.globalCompositeOperation = 'destination-out';
                    innerCtx.shadowColor = 'transparent';
                    innerCtx.fillStyle = '#FFFFFF';
                    innerCtx.beginPath(); innerCtx.moveTo(innerBoxOffset + radius, innerBoxOffset); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset + radius); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize - radius, innerBoxOffset + innerBoxSize); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize - radius); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset, innerBoxOffset + radius, innerBoxOffset); innerCtx.closePath(); innerCtx.fill();
                    innerCtx.globalCompositeOperation = 'source-over';

                    // 裁剪并绘制图片
                    innerCtx.beginPath(); innerCtx.moveTo(innerBoxOffset + radius, innerBoxOffset); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset + radius); innerCtx.quadraticCurveTo(innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize, innerBoxOffset + innerBoxSize - radius, innerBoxOffset + innerBoxSize); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset + innerBoxSize, innerBoxOffset, innerBoxOffset + innerBoxSize - radius); innerCtx.quadraticCurveTo(innerBoxOffset, innerBoxOffset, innerBoxOffset + radius, innerBoxOffset); innerCtx.closePath(); innerCtx.clip();

                    const scale = Math.max(innerBoxSize / img.width, innerBoxSize / img.height);
                    const dw = img.width * scale;
                    const dh = img.height * scale;
                    const dx = (size - dw) / 2;
                    const dy = (size - dh) / 2;
                    innerCtx.shadowColor = 'transparent';
                    innerCtx.drawImage(img, dx, dy, dw, dh);

                    // 4. 叠加到主画布
                    ctx.drawImage(innerCanvas, 0, 0);

                    // --- 导出结果 ---
                    const dataURL = canvas.toDataURL('image/png');
                    resultImg.src = dataURL;
                    resultSection.style.display = 'block';

                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.download = 'icon_transparent.png';
                        link.href = dataURL;
                        link.click();
                    };

                    spinner.style.display = 'none';
                    btnText.textContent = '生成图标';
                    generateBtn.disabled = false;
                };
                img.src = URL.createObjectURL(selectedFile);
            }, 150);
        });
    </script>
</body>
</html>

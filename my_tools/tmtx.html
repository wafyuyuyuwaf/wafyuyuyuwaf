<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼豆图纸像素化工具 · MARD色号</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* ========== 样式（与之前完全一致） ========== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f7f5fa;
            color: #2d2a3a;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app {
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 32px 36px 40px;
            box-shadow: 0 20px 60px rgba(90, 60, 140, 0.12);
            transition: box-shadow 0.25s;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        .app-header .badge {
            font-size: 13px;
            background: #ede9fe;
            color: #6d28d9;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 500;
            -webkit-text-fill-color: #6d28d9;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 18px 24px;
            background: #faf8fc;
            padding: 20px 24px;
            border-radius: 16px;
            border: 1px solid #ede9fe;
            margin-bottom: 24px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4b4560;
            letter-spacing: 0.3px;
        }
        .control-group label .unit {
            font-weight: 400;
            color: #8b85a0;
            font-size: 12px;
        }
        .dimension-hint {
            font-size: 13px;
            color: #6b6485;
            margin: 0 0 2px 0;
            width: 100%;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .file-upload-wrapper {
            position: relative;
            display: inline-block;
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0.1px;
            height: 0.1px;
            pointer-events: none;
        }
        .file-upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            background: #ede9fe;
            color: #5b21b6;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .file-upload-label:hover {
            background: #ddd6fe;
        }
        .file-upload-label:active {
            transform: scale(0.96);
        }
        .file-upload-label .icon {
            font-size: 18px;
            line-height: 1;
        }
        .file-name {
            font-size: 13px;
            color: #6b6485;
            margin-left: 4px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 400;
        }
        .controls input[type="number"] {
            width: 76px;
            padding: 8px 6px 8px 12px;
            border: 1.5px solid #e2ddf0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #2d2a3a;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            -moz-appearance: textfield;
        }
        .controls input[type="number"]::-webkit-outer-spin-button,
        .controls input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .controls input[type="number"]:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
        }
        .controls select {
            padding: 8px 14px 8px 12px;
            border: 1.5px solid #e2ddf0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #2d2a3a;
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            appearance: auto;
        }
        .controls select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
        }
        .btn-primary {
            padding: 9px 28px;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.25s;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.30);
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.38);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .toggle-btn {
            padding: 9px 18px;
            border: 2px solid #c4b5e3;
            border-radius: 40px;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            color: #5b21b6;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .toggle-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }
        .toggle-btn:hover {
            transform: translateY(-1px);
        }
        .preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            min-height: 60px;
        }
        .preview-area .preview-img {
            max-height: 100px;
            max-width: 160px;
            border-radius: 10px;
            border: 1px solid #ede9fe;
            object-fit: contain;
            background: #faf8fc;
            display: none;
        }
        .preview-area .preview-placeholder {
            font-size: 14px;
            color: #a8a1bc;
        }
        .preview-area .info-text {
            font-size: 14px;
            color: #6b6485;
        }
        .grid-section {
            margin: 8px 0 20px 0;
        }
        .grid-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 4px 12px 4px;
            flex-wrap: wrap;
        }
        .grid-controls .zoom-label {
            font-size: 14px;
            font-weight: 600;
            color: #4b4560;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .grid-controls .zoom-slider {
            flex: 1;
            min-width: 200px;
            cursor: pointer;
            accent-color: #8b5cf6;
            height: 6px;
            background: #e2ddf0;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        .grid-controls .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #8b5cf6;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(124, 58, 237, 0.3);
        }
        .grid-controls .zoom-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #8b5cf6;
            cursor: pointer;
            border: none;
        }
        .grid-controls .zoom-value {
            min-width: 48px;
            font-weight: 700;
            font-size: 15px;
            color: #4b4560;
            text-align: center;
        }
        .grid-controls .total-beads {
            font-size: 15px;
            font-weight: 600;
            color: #6d28d9;
            background: #ede9fe;
            padding: 4px 16px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .grid-controls .total-beads span {
            font-weight: 700;
        }
        .zoom-warning {
            font-size: 13px;
            color: #dc2626;
            background: #fee2e2;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            display: none;
            white-space: nowrap;
            border: 1px solid #fecaca;
        }
        .zoom-warning.show {
            display: inline-block;
        }
        .grid-wrapper {
            position: relative;
            overflow: auto;
            padding: 8px 0 8px 0;
            border-radius: 14px;
            background: #fcfafd;
            border: 1px solid #f0ebf8;
            max-height: 75vh;
        }
        .grid-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: fit-content;
            margin: 0 auto;
            background: #fcfafd;
            border-left: 6px solid #8b5cf6;
            border-right: 6px solid #8b5cf6;
        }
        .grid-container.grid-layout {
            display: grid;
            gap: 1px;
            background-color: #d5cee2;
            border-left: 6px solid #8b5cf6;
            border-right: 6px solid #8b5cf6;
        }
        .cell {
            flex-shrink: 0;
            background-color: #ffffff;
            transition: background-color 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 6px;
            text-shadow: 0 0 2px #fff;
        }
        .axis-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-family: 'SF Mono', 'Menlo', monospace;
            color: #4b2f7a;
            background-color: #ede9fe;
            user-select: none;
            transition: background-color 0.1s;
            min-width: 0;
            min-height: 0;
        }
        .axis-label.row-label {
            background-color: #e8e0f7;
        }
        .axis-label.col-label {
            background-color: #e8e0f7;
        }
        .axis-label.corner {
            background-color: #f5f1fc;
        }
        .canvas-grid {
            display: block;
            margin: 0 auto;
            background: #fcfafd;
            border-left: 6px solid #8b5cf6;
            border-right: 6px solid #8b5cf6;
        }
        .grid-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: #b8add6;
            font-size: 15px;
            font-weight: 500;
            min-height: 200px;
            flex-direction: column;
            gap: 8px;
        }
        .grid-placeholder .emoji-big {
            font-size: 42px;
        }
        .legend-area {
            margin-top: 20px;
            padding: 20px 24px 24px;
            background: #faf8fc;
            border-radius: 16px;
            border: 1px solid #ede9fe;
        }
        .legend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 16px;
            margin-bottom: 16px;
        }
        .legend-header .title {
            font-size: 16px;
            font-weight: 700;
            color: #2d2a3a;
        }
        .legend-header .title span {
            font-weight: 400;
            font-size: 14px;
            color: #7a7396;
            margin-left: 6px;
        }
        .legend-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            padding: 4px 0 2px;
            max-height: 260px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #3d3852;
            background: #ffffff;
            padding: 4px 12px 4px 6px;
            border-radius: 30px;
            border: 1px solid #ede9fe;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.15s;
        }
        .legend-item:hover {
            box-shadow: 0 2px 10px rgba(90, 60, 140, 0.08);
        }
        .legend-item .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 1px solid #e9e4f2;
            flex-shrink: 0;
        }
        .legend-item .color-hex {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #4b4560;
        }
        .legend-item .color-count {
            font-size: 12px;
            font-weight: 400;
            color: #8b85a0;
            margin-left: 2px;
        }
        .legend-item .color-count::before {
            content: '· ';
            color: #c8c0db;
        }
        .btn-download {
            padding: 9px 26px;
            background: #10b981;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.25s;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.30);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-download:hover {
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.38);
            transform: translateY(-1px);
        }
        .btn-download:active {
            transform: scale(0.96);
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 32px 40px 40px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .modal-box h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #2d2a3a;
        }
        .modal-box p {
            font-size: 15px;
            color: #6b6485;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-box .modal-actions button {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.2s;
            min-width: 120px;
        }
        .modal-box .modal-actions .btn-svg {
            background: #8b5cf6;
            color: #fff;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
        }
        .modal-box .modal-actions .btn-svg:hover {
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
        .modal-box .modal-actions .btn-tiles {
            background: #f59e0b;
            color: #fff;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
        }
        .modal-box .modal-actions .btn-tiles:hover {
            box-shadow: 0 6px 24px rgba(245, 158, 11, 0.4);
            transform: translateY(-2px);
        }
        .modal-box .modal-actions .btn-cancel {
            background: #e2ddf0;
            color: #4b4560;
        }
        .modal-box .modal-actions .btn-cancel:hover {
            background: #d5cee2;
        }
        @media (max-width: 700px) {
            .app { padding: 18px 14px 24px; }
            .controls { padding: 16px 16px; gap: 14px 16px; }
            .controls input[type="number"] { width: 64px; padding: 6px 4px 6px 10px; font-size: 14px; }
            .controls select { font-size: 13px; padding: 6px 10px; }
            .file-upload-label { font-size: 13px; padding: 7px 14px; }
            .btn-primary { padding: 7px 20px; font-size: 14px; }
            .grid-wrapper { max-height: 60vh; }
            .legend-items { gap: 8px 12px; max-height: 200px; }
            .legend-item { font-size: 12px; padding: 3px 10px 3px 5px; }
            .legend-item .color-swatch { width: 18px; height: 18px; }
            .app-header h1 { font-size: 21px; }
            .grid-controls .zoom-slider { min-width: 100px; }
            .modal-box { padding: 24px 20px; }
            .zoom-warning { white-space: normal; }
        }
        @media (max-width: 480px) {
            .controls { flex-direction: column; align-items: stretch; gap: 12px; }
            .control-group { width: 100%; }
            .controls input[type="number"] { width: 100%; }
            .controls select { width: 100%; }
            .file-upload-wrapper { width: 100%; }
            .file-upload-label { justify-content: center; width: 100%; }
            .btn-primary { width: 100%; justify-content: center; }
            .legend-header { flex-direction: column; align-items: flex-start; }
            .legend-actions { width: 100%; }
            .legend-actions .btn-download { flex: 1; justify-content: center; }
            .grid-controls { flex-direction: column; align-items: stretch; gap: 8px; }
            .grid-controls .zoom-slider { width: 100%; }
            .grid-controls .total-beads { text-align: center; }
            .modal-box .modal-actions button { width: 100%; }
            .zoom-warning { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="app">
        <header class="app-header">
            <h1>🧩 拼豆图纸 · 像素化</h1>
            <span class="badge">MARD 色号</span>
        </header>

        <section class="controls">
            <div class="control-group">
                <label>📤 上传图片</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="fileInput" accept="image/*" />
                    <label class="file-upload-label" for="fileInput">
                        <span class="icon">🖼️</span> 选择图片
                        <span class="file-name" id="fileName">未选择</span>
                    </label>
                </div>
            </div>

            <div class="dimension-hint">建议根据图片像素长宽比调整尺寸</div>

            <div class="control-group">
                <label>行数 <span class="unit">(Rows)</span></label>
                <input type="number" id="rowsInput" value="40" min="1" />
            </div>

            <div class="control-group">
                <label>列数 <span class="unit">(Cols)</span></label>
                <input type="number" id="colsInput" value="30" min="1" />
            </div>

            <div class="control-group" style="justify-content: flex-end;">
                <button class="toggle-btn" id="lockBtn">🔒 锁定比例</button>
            </div>

            <div class="control-group">
                <label>🎨 颜色精度</label>
                <select id="precisionSelect">
                    <option value="low">低 (≤256色)</option>
                    <option value="medium" selected>中 (256~1024色)</option>
                    <option value="high">高 (≥1024色)</option>
                </select>
                <div style="font-size:12px;color:#aaa;margin-top:4px;font-style:italic;">颜色精度没什么用。。。</div>
            </div>

            <div class="control-group" style="justify-content: flex-end;">
                <button class="btn-primary" id="generateBtn">✨ 生成图纸</button>
            </div>
        </section>

        <div class="preview-area" id="previewArea">
            <img class="preview-img" id="previewImg" alt="预览" />
            <span class="preview-placeholder" id="previewPlaceholder">📷 上传图片后，此处显示缩略图</span>
            <span class="info-text" id="imageInfo"></span>
        </div>

        <section class="grid-section">
            <div class="grid-controls" id="gridControls">
                <span class="zoom-label">🔍 缩放</span>
                <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="300" value="100" step="1" />
                <span class="zoom-value" id="zoomValue">100%</span>
                <span class="zoom-warning" id="zoomWarning">⚠️ 数量较多，缩放操作可能导致卡顿，请谨慎使用</span>
                <span class="total-beads" id="totalBeadsDisplay">🧶 共 <span id="beadCount">0</span> 颗</span>
            </div>
            <div class="grid-wrapper" id="gridWrapper">
                <div id="gridContainer" class="grid-container">
                    <div class="grid-placeholder" id="gridPlaceholder">
                        <span class="emoji-big">🧩</span>
                        <span>上传图片并点击「生成图纸」</span>
                        <span style="font-size:13px;color:#c8c0db;">网格将在此处呈现 · 左侧及底部显示坐标</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="legend-area" id="legendArea">
            <div class="legend-header">
                <div class="title">
                    🎨 颜色图例
                    <span id="legendCount">(0 种颜色)</span>
                </div>
                <div class="legend-actions">
                    <button class="btn-download" id="downloadBtn">⬇️ 下载图纸 (PNG)</button>
                </div>
            </div>
            <div class="legend-items" id="legendItems">
                <span style="color:#b8add6;font-size:14px;padding:6px 0;">暂无数据，生成图纸后显示</span>
            </div>
        </section>
    </div>

    <!-- 导出选择模态框 -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal-box">
            <h2>📐 图纸较大</h2>
            <p>当前图纸共 <strong id="modalBeadCount">0</strong> 颗拼豆，超过 10,000 颗。<br>建议选择 SVG 导出（矢量无损），或分块导出高清 PNG（打包为 ZIP）。</p>
            <div class="modal-actions">
                <button class="btn-svg" id="modalSvgBtn">📄 推荐：导出 SVG</button>

            // ============================================================
            //  工具函数（不变）
            // ============================================================
            function rgbToHex(r, g, b) {
                const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
                return '#' + [clamp(r), clamp(g), clamp(b)]
                    .map(c => c.toString(16).padStart(2, '0'))
                    .join('');
            }

            function findClosestMard(r, g, b) {
                let closestCode = null;
                let closestDist = Infinity;
                for (const [code, hex] of Object.entries(MARD_COLORS)) {
                    const c = parseInt(hex.slice(1, 3), 16);
                    const m = parseInt(hex.slice(3, 5), 16);
                    const y = parseInt(hex.slice(5, 7), 16);
                    const dist = (r - c) ** 2 + (g - m) ** 2 + (b - y) ** 2;
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestCode = code;
                    }
                }
                return closestCode;
            }

            function getQuantizationLevels(precision) {
                switch (precision) {
                    case 'low':
                        return 6;
                    case 'medium':
                        return 10;
                    case 'high':
                        return 16;
                    default:
                        return 10;
                }
            }

            function quantizeColor(r, g, b, levels) {
                const step = 255 / (levels - 1);
                const qr = Math.round(r / step) * step;
                const qg = Math.round(g / step) * step;
                const qb = Math.round(b / step) * step;
                return {
                    r: Math.max(0, Math.min(255, qr)),
                    g: Math.max(0, Math.min(255, qg)),
                    b: Math.max(0, Math.min(255, qb))
                };
            }

            function isWhite(r, g, b, threshold) {
                threshold = threshold || 240;
                return r >= threshold && g >= threshold && b >= threshold;
            }

            function isTransparent(a) {
                return a < 128;
            }

            function getContrastColor(hex) {
                if (!hex) return '#000';
                let r, g, b;
                if (hex.startsWith('#')) {
                    let h = hex.slice(1);
                    if (h.length === 3) {
                        h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
                    }
                    r = parseInt(h.substr(0, 2), 16);
                    g = parseInt(h.substr(2, 2), 16);
                    b = parseInt(h.substr(4, 2), 16);
                } else {
                    return '#000';
                }
                const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                return luminance > 0.5 ? '#000000' : '#ffffff';
            }

            // ---------- 颜色采样 ----------
            function getAverageColorWithMard(imageData, x, y, width, height, imgW, imgH, quantLevels) {
                const data = imageData.data;
                const sw = imageData.width;
                const sh = imageData.height;

                const startX = Math.floor((x / width) * sw);
                const endX = Math.floor(((x + 1) / width) * sw);
                const startY = Math.floor((y / height) * sh);
                const endY = Math.floor(((y + 1) / height) * sh);

                const pxStart = Math.max(0, startX);
                const pxEnd = Math.min(sw, endX);
                const pyStart = Math.max(0, startY);
                const pyEnd = Math.min(sh, endY);

                let rTotal = 0,
                    gTotal = 0,
                    bTotal = 0,
                    count = 0;
                let transparentCount = 0;
                const totalPixels = (pxEnd - pxStart) * (pyEnd - pyStart);

                for (let py = pyStart; py < pyEnd; py++) {
                    for (let px = pxStart; px < pxEnd; px++) {
                        const idx = (py * sw + px) * 4;
                        const a = data[idx + 3];
                        if (isTransparent(a)) {
                            transparentCount++;
                            continue;
                        }
                        rTotal += data[idx];
                        gTotal += data[idx + 1];
                        bTotal += data[idx + 2];
                        count++;
                    }
                }

                if (count === 0 || (transparentCount / totalPixels) > 0.8) {
                    return { hex: null, mardCode: null, isTransparent: true };
                }

                let avgR = rTotal / count;
                let avgG = gTotal / count;
                let avgB = bTotal / count;

                if (isWhite(avgR, avgG, avgB)) {
                    return { hex: '#FFFFFF', mardCode: 'H2', isTransparent: false };
                }

                if (quantLevels && quantLevels > 1) {
                    const q = quantizeColor(avgR, avgG, avgB, quantLevels);
                    avgR = q.r;
                    avgG = q.g;
                    avgB = q.b;
                }

                const hex = rgbToHex(avgR, avgG, avgB);
                const mardCode = findClosestMard(avgR, avgG, avgB);
                return { hex, mardCode, isTransparent: false };
            }

            // ---------- 生成网格数据 ----------
            function generateGridData(image, rows, cols, quantLevels) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const imgW = image.naturalWidth || image.width;
                const imgH = image.naturalHeight || image.height;
                canvas.width = imgW;
                canvas.height = imgH;
                ctx.drawImage(image, 0, 0, imgW, imgH);

                let imageData;
                try {
                    imageData = ctx.getImageData(0, 0, imgW, imgH);
                } catch (err) {
                    throw new Error('无法读取图片像素数据，请确保图片格式正确且未受跨域限制。');
                }

                const total = rows * cols;
                const hexColors = new Array(total);
                const mardColors = new Array(total);
                const isTransparentArr = new Array(total);
                const colorMap = new Map();

                let transparentCount = 0;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        const result = getAverageColorWithMard(
                            imageData, c, r, cols, rows, imgW, imgH,
                            quantLevels
                        );
                        if (result.isTransparent) {
                            hexColors[idx] = null;
                            mardColors[idx] = null;
                            isTransparentArr[idx] = true;
                            transparentCount++;
                        } else {
                            hexColors[idx] = result.hex;
                            mardColors[idx] = result.mardCode;
                            isTransparentArr[idx] = false;
                            colorMap.set(result.mardCode, (colorMap.get(result.mardCode) || 0) + 1);
                        }
                    }
                }

                const totalBeads = rows * cols - transparentCount;

                return {
                    hexColors,
                    mardColors,
                    isTransparentArr,
                    rows,
                    cols,
                    colorMap,
                    transparentCount,
                    totalBeads
                };
            }

            // ---------- 渲染函数（完全使用 Canvas） ----------
            function renderGrid(gridData, zoomPercent) {
                const { hexColors, mardColors, isTransparentArr, rows, cols, colorMap, transparentCount, totalBeads } = gridData;
                beadCountSpan.textContent = totalBeads;

                const totalCells = rows * cols;
                if (totalCells > 15000) {
                    zoomWarning.classList.add('show');
                } else {
                    zoomWarning.classList.remove('show');
                }

                // 清空容器，使用纯 Canvas
                gridContainer.innerHTML = '';
                gridContainer.style.display = 'flex';
                gridContainer.style.borderLeft = '6px solid #8b5cf6';
                gridContainer.style.borderRight = '6px solid #8b5cf6';
                gridPlaceholder.style.display = 'none';

                const canvas = document.createElement('canvas');
                canvas.className = 'canvas-grid';
                gridContainer.appendChild(canvas);
                const ctx = canvas.getContext('2d');

                const BASE_CELL = 20,
                    BASE_GAP = 1,
                    BASE_AXIS = 30,
                    BASE_BORDER = 6;
                const scale = zoomPercent / 100;
                const cellSize = Math.max(2, BASE_CELL * scale);
                const gap = Math.max(0.5, BASE_GAP * scale);
                const axisSize = Math.max(14, BASE_AXIS * scale);
                const borderWidth = Math.max(2, BASE_BORDER * scale);

                const gridW = cols * cellSize + (cols - 1) * gap;
                const gridH = rows * cellSize + (rows - 1) * gap;
                const totalW = axisSize + gridW + borderWidth * 2;
                const totalH = gridH + axisSize;

                canvas.width = totalW;
                canvas.height = totalH;
                canvas.style.width = totalW + 'px';
                canvas.style.height = totalH + 'px';

                ctx.fillStyle = '#d5cee2';
                ctx.fillRect(axisSize + borderWidth, 0, gridW, gridH);

                const gridOffsetX = axisSize + borderWidth;
                const gridOffsetY = 0;
                const fontSize = Math.max(4, Math.round(cellSize * 0.3));
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        if (isTransparentArr[idx]) continue;
                        const x = gridOffsetX + c * (cellSize + gap);
                        const y = gridOffsetY + r * (cellSize + gap);
                        const hex = hexColors[idx];
                        ctx.fillStyle = hex;
                        ctx.fillRect(x, y, cellSize, cellSize);
                        const mard = mardColors[idx] || '';
                        ctx.fillStyle = getContrastColor(hex);
                        ctx.font = `${fontSize}px "SF Mono", monospace`;
                        ctx.fillText(mard, x + cellSize / 2, y + cellSize / 2);
                    }
                }

                ctx.fillStyle = '#8b5cf6';
                ctx.fillRect(axisSize, 0, borderWidth, gridH);
                ctx.fillRect(axisSize + borderWidth + gridW, 0, borderWidth, gridH);

                let axisFontSize = Math.max(7, Math.round(axisSize * 0.35));
                ctx.font = `600 ${axisFontSize}px "SF Mono", "Menlo", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#4b2f7a';
                for (let r = 0; r < rows; r++) {
                    const y = r * (cellSize + gap) + cellSize / 2;
                    ctx.fillText(String(r + 1), axisSize / 2, y);
                }
                for (let c = 0; c < cols; c++) {
                    const x = gridOffsetX + c * (cellSize + gap) + cellSize / 2;
                    const y = gridH + axisSize / 2;
                    ctx.fillText(String(c + 1), x, y);
                }

                renderLegend(colorMap);
                isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ 生成图纸';
                downloadBtn.disabled = false;
            }

            // ---------- 界面图例（保持原样，横向排列） ----------
            function renderLegend(colorMap) {
                legendItems.innerHTML = '';
                if (!colorMap || colorMap.size === 0) {
                    legendItems.innerHTML = '<span style="color:#b8add6;font-size:14px;padding:6px 0;">暂无颜色数据</span>';
                    legendCount.textContent = '(0 种颜色)';
                    return;
                }
                const sortedEntries = Array.from(colorMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                legendCount.textContent = `(${sortedEntries.length} 种颜色)`;
                for (const [mardCode, count] of sortedEntries) {
                    const hex = MARD_COLORS[mardCode] || '#CCCCCC';
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    const swatch = document.createElement('span');
                    swatch.className = 'color-swatch';
                    swatch.style.backgroundColor = hex;
                    const codeSpan = document.createElement('span');
                    codeSpan.className = 'color-hex';
                    codeSpan.textContent = mardCode;
                    const hexSpan = document.createElement('span');
                    hexSpan.style.fontSize = '11px';
                    hexSpan.style.color = '#aaa';
                    hexSpan.textContent = hex;
                    const countSpan = document.createElement('span');
                    countSpan.className = 'color-count';
                    countSpan.textContent = `${count} 个`;
                    item.appendChild(swatch);
                    item.appendChild(codeSpan);
                    item.appendChild(hexSpan);
                    item.appendChild(countSpan);
                    legendItems.appendChild(item);
                }
            }

            // ============================================================
            //  导出功能（图例改为 竖向排列 · 列优先）—— 完全保留
            // ============================================================

            // ---------- 辅助：绘制网格到 Canvas（不变） ----------
            function drawGridOnCanvas(gridData, CELL_SIZE, GAP, BORDER_WIDTH, AXIS_SIZE) {
                const { hexColors, mardColors, isTransparentArr, rows, cols } = gridData;
                const gridW = cols * CELL_SIZE + (cols - 1) * GAP;
                const gridH = rows * CELL_SIZE + (rows - 1) * GAP;
                const totalW = AXIS_SIZE + gridW + BORDER_WIDTH * 2;
                const totalH = gridH + AXIS_SIZE;

                const canvas = document.createElement('canvas');
                canvas.width = totalW;
                canvas.height = totalH;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, totalW, totalH);

                const gridOffsetX = AXIS_SIZE + BORDER_WIDTH;
                const gridOffsetY = 0;

                ctx.fillStyle = '#d5cee2';
                ctx.fillRect(gridOffsetX, gridOffsetY, gridW, gridH);

                const fontSize = Math.round(CELL_SIZE * 0.25);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        if (isTransparentArr[idx]) continue;
                        const x = gridOffsetX + c * (CELL_SIZE + GAP);
                        const y = gridOffsetY + r * (CELL_SIZE + GAP);
                        const hex = hexColors[idx];
                        ctx.fillStyle = hex;
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        const mard = mardColors[idx] || '';
                        ctx.fillStyle = getContrastColor(hex);
                        ctx.font = `${fontSize}px "SF Mono", monospace`;
                        ctx.fillText(mard, x + CELL_SIZE / 2, y + CELL_SIZE / 2);
                    }
                }

                ctx.fillStyle = '#8b5cf6';
                ctx.fillRect(AXIS_SIZE, 0, BORDER_WIDTH, gridH);
                ctx.fillRect(AXIS_SIZE + BORDER_WIDTH + gridW, 0, BORDER_WIDTH, gridH);

                let axisFontSize = Math.round(CELL_SIZE * 0.35);
                if (axisFontSize < 8) axisFontSize = 8;
                if (axisFontSize > 16) axisFontSize = 16;
                ctx.font = `600 ${axisFontSize}px "SF Mono", "Menlo", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#4b2f7a';
                for (let r = 0; r < rows; r++) {
                    const y = r * (CELL_SIZE + GAP) + CELL_SIZE / 2;
                    ctx.fillText(String(r + 1), AXIS_SIZE / 2, y);
                }
                for (let c = 0; c < cols; c++) {
                    const x = gridOffsetX + c * (CELL_SIZE + GAP) + CELL_SIZE / 2;
                    const y = gridH + AXIS_SIZE / 2;
                    ctx.fillText(String(c + 1), x, y);
                }

                return canvas;
            }

            // ---------- 1. 高清 PNG（图例竖向排列 · 列优先） ----------
            function downloadHighResPNG(gridData) {
                const CELL_SIZE = 40,
                    GAP = 2,
                    BORDER_WIDTH = 12,
                    AXIS_SIZE = 60;
                const ITEMS_PER_COL = 12; // 每列显示 12 个颜色
                const LEGEND_ITEM_HEIGHT = 44,
                    LEGEND_PADDING = 30,
                    LEGEND_ITEM_SPACING = 14;

                const { rows, cols, colorMap, totalBeads, transparentCount } = gridData;
                const gridW = cols * CELL_SIZE + (cols - 1) * GAP;
                const gridH = rows * CELL_SIZE + (rows - 1) * GAP;
                const totalW = AXIS_SIZE + gridW + BORDER_WIDTH * 2;
                const totalH = gridH + AXIS_SIZE;

                const sortedEntries = Array.from(colorMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                const totalColors = sortedEntries.length;
                const colsCount = Math.ceil(totalColors / ITEMS_PER_COL);
                const rowsCount = Math.min(totalColors, ITEMS_PER_COL);

                // 计算每个图例项的宽度（根据内容自适应）
                const ctx = document.createElement('canvas').getContext('2d');
                ctx.font = '600 14px "SF Mono", "Menlo", monospace';
                let maxCodeWidth = 0;
                for (const [code] of sortedEntries) {
                    const m = ctx.measureText(code);
                    if (m.width > maxCodeWidth) maxCodeWidth = m.width;
                }
                const itemWidth = 28 + 6 + maxCodeWidth + 8 + 60 + 12;
                const legendItemWidth = itemWidth;
                const legendTotalWidth = Math.max(totalW, colsCount * (legendItemWidth + LEGEND_ITEM_SPACING) + 20);
                const legendTotalHeight = LEGEND_PADDING * 2 + 48 + rowsCount * LEGEND_ITEM_HEIGHT;
                const BEAD_LABEL_HEIGHT = 50;

                const canvasW = Math.max(legendTotalWidth, totalW, 500);
                const canvasH = totalH + legendTotalHeight + 40 + BEAD_LABEL_HEIGHT;
                const canvas = document.createElement('canvas');
                canvas.width = canvasW;
                canvas.height = canvasH;
                const cctx = canvas.getContext('2d');
                cctx.clearRect(0, 0, canvasW, canvasH);

                const gridCanvas = drawGridOnCanvas(gridData, CELL_SIZE, GAP, BORDER_WIDTH, AXIS_SIZE);
                cctx.drawImage(gridCanvas, 0, 0);

                // ---- 图例（竖向排列 · 列优先） ----
                const legendY = totalH + 20;
                cctx.fillStyle = '#faf8fc';
                cctx.shadowColor = 'rgba(0,0,0,0.04)';
                cctx.shadowBlur = 8;
                cctx.shadowOffsetY = 2;
                cctx.beginPath();
                cctx.roundRect(10, legendY, canvasW - 20, legendTotalHeight, 12);
                cctx.fill();
                cctx.shadowColor = 'transparent';
                cctx.shadowBlur = 0;

                cctx.fillStyle = '#2d2a3a';
                cctx.font = 'bold 18px "Segoe UI", "PingFang SC", sans-serif';
                cctx.textAlign = 'left';
                cctx.textBaseline = 'top';
                cctx.fillText('🎨 颜色图例 (MARD色号)', 24, legendY + 12);

                const startX = 24;
                const startY = legendY + 48;
                for (let i = 0; i < sortedEntries.length; i++) {
                    const [mardCode, count] = sortedEntries[i];
                    const hex = MARD_COLORS[mardCode] || '#CCCCCC';
                    // 列优先：先按列填充
                    const col = Math.floor(i / ITEMS_PER_COL);
                    const row = i % ITEMS_PER_COL;
                    const x = startX + col * (legendItemWidth + LEGEND_ITEM_SPACING);
                    const y = startY + row * LEGEND_ITEM_HEIGHT;

                    cctx.fillStyle = hex;
                    cctx.shadowColor = 'rgba(0,0,0,0.06)';
                    cctx.shadowBlur = 4;
                    cctx.shadowOffsetY = 1;
                    cctx.beginPath();
                    cctx.roundRect(x, y, 28, 28, 6);
                    cctx.fill();
                    cctx.shadowColor = 'transparent';
                    cctx.shadowBlur = 0;
                    cctx.strokeStyle = '#e9e4f2';
                    cctx.lineWidth = 1;
                    cctx.beginPath();
                    cctx.roundRect(x, y, 28, 28, 6);
                    cctx.stroke();

                    cctx.fillStyle = '#4b4560';
                    cctx.font = '600 14px "SF Mono", "Menlo", monospace';
                    cctx.textAlign = 'left';
                    cctx.textBaseline = 'middle';
                    cctx.fillText(mardCode, x + 34, y + 14);

                    cctx.fillStyle = '#8b85a0';
                    cctx.font = '13px "Segoe UI", "PingFang SC", sans-serif';
                    const countText = `· ${count} 个`;
                    const codeWidth = cctx.measureText(mardCode).width;
                    cctx.fillText(countText, x + 34 + codeWidth + 8, y + 14);
                }

                const beadY = legendY + legendTotalHeight + 16;
                cctx.fillStyle = '#6d28d9';
                cctx.font = 'bold 17px "Segoe UI", "PingFang SC", sans-serif';
                cctx.textAlign = 'center';
                cctx.textBaseline = 'top';
                cctx.fillText(`🧶 共 ${totalBeads} 颗拼豆（透明区域 ${transparentCount} 颗未计入）`, canvasW / 2, beadY);

                try {
                    const link = document.createElement('a');
                    link.download = `拼豆图纸_MARD_${rows}x${cols}_${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) {
                    alert('导出 PNG 失败，请尝试 SVG 或分块导出。');
                }
            }

            // ---------- 2. SVG 导出（图例竖向排列 · 列优先） ----------
            function downloadSVG(gridData) {
                const { hexColors, mardColors, isTransparentArr, rows, cols, colorMap, totalBeads, transparentCount } = gridData;
                const CELL_SIZE = 20,
                    GAP = 1,
                    BORDER_WIDTH = 6,
                    AXIS_SIZE = 30;
                const gridW = cols * CELL_SIZE + (cols - 1) * GAP;
                const gridH = rows * CELL_SIZE + (rows - 1) * GAP;
                const totalW = AXIS_SIZE + gridW + BORDER_WIDTH * 2;
                const totalH = gridH + AXIS_SIZE;

                const sortedEntries = Array.from(colorMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                const ITEMS_PER_COL = 12;
                const totalColors = sortedEntries.length;
                const colsCount = Math.ceil(totalColors / ITEMS_PER_COL);
                const rowsCount = Math.min(totalColors, ITEMS_PER_COL);
                const legendItemHeight = 32;
                const legendPadding = 30;
                const legendTitleHeight = 40;
                const legendTotalHeight = legendPadding * 2 + legendTitleHeight + rowsCount * legendItemHeight;

                const perItemWidth = 120;
                const legendTotalWidth = Math.max(totalW, colsCount * (perItemWidth + 14) + 20);

                const beadLabelHeight = 40;
                const svgHeight = totalH + legendTotalHeight + beadLabelHeight + 20;

                let svg =
                    `<svg xmlns="http://www.w3.org/2000/svg" width="${legendTotalWidth}" height="${svgHeight}" viewBox="0 0 ${legendTotalWidth} ${svgHeight}">`;
                svg += `<rect width="100%" height="100%" fill="white"/>`;

                const gridOffsetX = (legendTotalWidth - totalW) / 2;
                svg +=
                `<rect x="${gridOffsetX + AXIS_SIZE + BORDER_WIDTH}" y="0" width="${gridW}" height="${gridH}" fill="#d5cee2"/>`;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        if (isTransparentArr[idx]) continue;
                        const x = gridOffsetX + AXIS_SIZE + BORDER_WIDTH + c * (CELL_SIZE + GAP);
                        const y = r * (CELL_SIZE + GAP);
                        const hex = hexColors[idx];
                        svg +=
                            `<rect x="${x}" y="${y}" width="${CELL_SIZE}" height="${CELL_SIZE}" fill="${hex}" stroke="#ccc" stroke-width="0.5"/>`;
                        const mard = mardColors[idx] || '';
                        const textColor = getContrastColor(hex);
                        svg +=
                            `<text x="${x + CELL_SIZE/2}" y="${y + CELL_SIZE/2}" font-size="5" font-weight="bold" fill="${textColor}" text-anchor="middle" dominant-baseline="central">${mard}</text>`;
                    }
                }

                svg +=
                    `<rect x="${gridOffsetX + AXIS_SIZE}" y="0" width="${BORDER_WIDTH}" height="${gridH}" fill="#8b5cf6"/>`;
                svg +=
                    `<rect x="${gridOffsetX + AXIS_SIZE + BORDER_WIDTH + gridW}" y="0" width="${BORDER_WIDTH}" height="${gridH}" fill="#8b5cf6"/>`;

                let axisFontSize = 11;
                if (rows > 80) axisFontSize = 9;
                if (rows > 150) axisFontSize = 8;
                if (rows > 250) axisFontSize = 7;
                for (let r = 0; r < rows; r++) {
                    const y = r * (CELL_SIZE + GAP) + CELL_SIZE / 2;
                    svg +=
                        `<text x="${gridOffsetX + AXIS_SIZE/2}" y="${y}" font-size="${axisFontSize}" font-weight="600" fill="#4b2f7a" text-anchor="middle" dominant-baseline="central">${r+1}</text>`;
                }
                for (let c = 0; c < cols; c++) {
                    const x = gridOffsetX + AXIS_SIZE + BORDER_WIDTH + c * (CELL_SIZE + GAP) + CELL_SIZE / 2;
                    const y = gridH + AXIS_SIZE / 2;
                    svg +=
                        `<text x="${x}" y="${y}" font-size="${axisFontSize}" font-weight="600" fill="#4b2f7a" text-anchor="middle" dominant-baseline="central">${c+1}</text>`;
                }

                // ---- 图例（竖向排列 · 列优先） ----
                const legendY = totalH + 10;
                svg +=
                    `<rect x="10" y="${legendY}" width="${legendTotalWidth - 20}" height="${legendTotalHeight}" rx="12" fill="#faf8fc" stroke="#ede9fe" stroke-width="1"/>`;
                svg +=
                    `<text x="24" y="${legendY + 20}" font-size="16" font-weight="bold" fill="#2d2a3a">🎨 颜色图例 (MARD色号)</text>`;

                const startX = 24;
                const startY = legendY + 40;
                const colWidth = (legendTotalWidth - 40 - (colsCount - 1) * 14) / colsCount;

                for (let i = 0; i < sortedEntries.length; i++) {
                    const [mardCode, count] = sortedEntries[i];
                    const hex = MARD_COLORS[mardCode] || '#CCCCCC';
                    const col = Math.floor(i / ITEMS_PER_COL);
                    const row = i % ITEMS_PER_COL;
                    const x = startX + col * (colWidth + 14);
                    const y = startY + row * legendItemHeight;

                    svg +=
                        `<rect x="${x}" y="${y}" width="22" height="22" rx="4" fill="${hex}" stroke="#e9e4f2" stroke-width="1"/>`;
                    svg +=
                        `<text x="${x + 28}" y="${y + 11}" font-size="12" font-weight="600" fill="#4b4560" dominant-baseline="central">${mardCode}</text>`;
                    const countText = `· ${count} 个`;
                    const codeWidth = mardCode.length * 7;
                    svg +=
                        `<text x="${x + 28 + codeWidth + 8}" y="${y + 11}" font-size="12" fill="#8b85a0" dominant-baseline="central">${countText}</text>`;
                }

                const beadY = legendY + legendTotalHeight + 10;
                svg +=
                    `<text x="${legendTotalWidth/2}" y="${beadY}" font-size="15" font-weight="bold" fill="#6d28d9" text-anchor="middle">🧶 共 ${totalBeads} 颗拼豆（透明区域 ${transparentCount} 颗未计入）</text>`;

                svg += '</svg>';

                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `拼豆图纸_MARD_${rows}x${cols}_${Date.now()}.svg`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }

            // ---------- 3. 分块导出 PNG（图例竖向排列 · 列优先） ----------
            function downloadTiles(gridData) {
                const { rows, cols } = gridData;
                const MAX_TILE_SIZE = 200;
                const tileRows = Math.ceil(rows / MAX_TILE_SIZE);
                const tileCols = Math.ceil(cols / MAX_TILE_SIZE);
                const totalTiles = tileRows * tileCols;

                if (totalTiles === 1) {
                    downloadHighResPNG(gridData);
                    return;
                }

                const zip = new JSZip();

                function getTileData(rowStart, rowEnd, colStart, colEnd) {
                    const tRows = rowEnd - rowStart;
                    const tCols = colEnd - colStart;
                    const tHex = [];
                    const tMard = [];
                    const tTrans = [];
                    const tColorMap = new Map();
                    let tTransCount = 0;
                    for (let r = rowStart; r < rowEnd; r++) {
                        for (let c = colStart; c < colEnd; c++) {
                            const idx = r * cols + c;
                            const isTrans = gridData.isTransparentArr[idx];
                            tHex.push(isTrans ? null : gridData.hexColors[idx]);
                            tMard.push(isTrans ? null : gridData.mardColors[idx]);
                            tTrans.push(isTrans);
                            if (isTrans) tTransCount++;
                            else {
                                const code = gridData.mardColors[idx];
                                tColorMap.set(code, (tColorMap.get(code) || 0) + 1);
                            }
                        }
                    }
                    const tTotal = tRows * tCols - tTransCount;
                    return {
                        hexColors: tHex,
                        mardColors: tMard,
                        isTransparentArr: tTrans,
                        rows: tRows,
                        cols: tCols,
                        colorMap: tColorMap,
                        transparentCount: tTransCount,
                        totalBeads: tTotal
                    };
                }

                function renderTileToCanvas(tileData) {
                    const CELL_SIZE = 40,
                        GAP = 2,
                        BORDER_WIDTH = 12,
                        AXIS_SIZE = 60;
                    const ITEMS_PER_COL = 10;
                    const LEGEND_ITEM_HEIGHT = 44,
                        LEGEND_PADDING = 30,
                        LEGEND_ITEM_SPACING = 14;

                    const { rows: tRows, cols: tCols, colorMap: tMap, totalBeads: tTotal, transparentCount: tTransCnt } =
                        tileData;
                    const gridW = tCols * CELL_SIZE + (tCols - 1) * GAP;
                    const gridH = tRows * CELL_SIZE + (tRows - 1) * GAP;
                    const totalW = AXIS_SIZE + gridW + BORDER_WIDTH * 2;
                    const totalH = gridH + AXIS_SIZE;

                    const sortedEntries = Array.from(tMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                    const totalColors = sortedEntries.length;
                    const colsCount = Math.ceil(totalColors / ITEMS_PER_COL);
                    const rowsCount = Math.min(totalColors, ITEMS_PER_COL);

                    const ctx = document.createElement('canvas').getContext('2d');
                    ctx.font = '600 14px "SF Mono", "Menlo", monospace';
                    let maxCodeWidth = 0;
                    for (const [code] of sortedEntries) {
                        const m = ctx.measureText(code);
                        if (m.width > maxCodeWidth) maxCodeWidth = m.width;
                    }
                    const itemWidth = 28 + 6 + maxCodeWidth + 8 + 60 + 12;
                    const legendItemWidth = itemWidth;
                    const legendTotalWidth = Math.max(totalW, colsCount * (legendItemWidth + LEGEND_ITEM_SPACING) + 20);
                    const legendTotalHeight = LEGEND_PADDING * 2 + 48 + rowsCount * LEGEND_ITEM_HEIGHT;
                    const BEAD_LABEL_HEIGHT = 50;

                    const canvasW = Math.max(legendTotalWidth, totalW, 500);
                    const canvasH = totalH + legendTotalHeight + 40 + BEAD_LABEL_HEIGHT;
                    const canvas = document.createElement('canvas');
                    canvas.width = canvasW;
                    canvas.height = canvasH;
                    const cctx = canvas.getContext('2d');
                    cctx.clearRect(0, 0, canvasW, canvasH);

                    const gridCanvas = drawGridOnCanvas(tileData, CELL_SIZE, GAP, BORDER_WIDTH, AXIS_SIZE);
                    cctx.drawImage(gridCanvas, 0, 0);

                    const legendY = totalH + 20;
                    cctx.fillStyle = '#faf8fc';
                    cctx.shadowColor = 'rgba(0,0,0,0.04)';
                    cctx.shadowBlur = 8;
                    cctx.shadowOffsetY = 2;
                    cctx.beginPath();
                    cctx.roundRect(10, legendY, canvasW - 20, legendTotalHeight, 12);
                    cctx.fill();
                    cctx.shadowColor = 'transparent';
                    cctx.shadowBlur = 0;

                    cctx.fillStyle = '#2d2a3a';
                    cctx.font = 'bold 18px "Segoe UI", "PingFang SC", sans-serif';
                    cctx.textAlign = 'left';
                    cctx.textBaseline = 'top';
                    cctx.fillText('🎨 颜色图例 (MARD色号)', 24, legendY + 12);

                    const startX = 24;
                    const startY = legendY + 48;
                    for (let i = 0; i < sortedEntries.length; i++) {
                        const [mardCode, count] = sortedEntries[i];
                        const hex = MARD_COLORS[mardCode] || '#CCCCCC';
                        const col = Math.floor(i / ITEMS_PER_COL);
                        const row = i % ITEMS_PER_COL;
                        const x = startX + col * (legendItemWidth + LEGEND_ITEM_SPACING);
                        const y = startY + row * LEGEND_ITEM_HEIGHT;

                        cctx.fillStyle = hex;
                        cctx.shadowColor = 'rgba(0,0,0,0.06)';
                        cctx.shadowBlur = 4;
                        cctx.shadowOffsetY = 1;
                        cctx.beginPath();
                        cctx.roundRect(x, y, 28, 28, 6);
                        cctx.fill();
                        cctx.shadowColor = 'transparent';
                        cctx.shadowBlur = 0;
                        cctx.strokeStyle = '#e9e4f2';
                        cctx.lineWidth = 1;
                        cctx.beginPath();
                        cctx.roundRect(x, y, 28, 28, 6);
                        cctx.stroke();

                        cctx.fillStyle = '#4b4560';
                        cctx.font = '600 14px "SF Mono", "Menlo", monospace';
                        cctx.textAlign = 'left';
                        cctx.textBaseline = 'middle';
                        cctx.fillText(mardCode, x + 34, y + 14);

                        cctx.fillStyle = '#8b85a0';
                        cctx.font = '13px "Segoe UI", "PingFang SC", sans-serif';
                        const countText = `· ${count} 个`;
                        const codeWidth = cctx.measureText(mardCode).width;
                        cctx.fillText(countText, x + 34 + codeWidth + 8, y + 14);
                    }

                    const beadY = legendY + legendTotalHeight + 16;
                    cctx.fillStyle = '#6d28d9';
                    cctx.font = 'bold 17px "Segoe UI", "PingFang SC", sans-serif';
                    cctx.textAlign = 'center';
                    cctx.textBaseline = 'top';
                    cctx.fillText(`🧶 共 ${tTotal} 颗拼豆（透明区域 ${tTransCnt} 颗未计入）`, canvasW / 2, beadY);

                    return canvas;
                }

                let tileIndex = 0;
                for (let tr = 0; tr < tileRows; tr++) {
                    for (let tc = 0; tc < tileCols; tc++) {
                        const rowStart = tr * MAX_TILE_SIZE;
                        const rowEnd = Math.min(rows, rowStart + MAX_TILE_SIZE);
                        const colStart = tc * MAX_TILE_SIZE;
                        const colEnd = Math.min(cols, colStart + MAX_TILE_SIZE);
                        const tileData = getTileData(rowStart, rowEnd, colStart, colEnd);
                        const canvas = renderTileToCanvas(tileData);
                        const dataURL = canvas.toDataURL('image/png');
                        const byteString = atob(dataURL.split(',')[1]);
                        const ab = new ArrayBuffer(byteString.length);
                        const ia = new Uint8Array(ab);
                        for (let i = 0; i < byteString.length; i++) {
                            ia[i] = byteString.charCodeAt(i);
                        }
                        const blob = new Blob([ab], { type: 'image/png' });
                        const name =
                            `拼豆图纸_分块${tileIndex+1}_行${rowStart+1}-${rowEnd}_列${colStart+1}-${colEnd}.png`;
                        zip.file(name, blob);
                        tileIndex++;
                    }
                }

                zip.generateAsync({ type: 'blob' })
                    .then(function(content) {
                        saveAs(content, `拼豆图纸_分块_${rows}x${cols}_${Date.now()}.zip`);
                    })
                    .catch(function(err) {
                        alert('打包 ZIP 失败：' + err.message);
                    });
            }

            // ============================================================
            //  智能导出入口
            // ============================================================
            function handleExport() {
                if (!currentGridData) {
                    alert('请先生成图纸！');
                    return;
                }
                const total = currentGridData.totalBeads;

                if (total > 250000) {
                    alert('图纸数量超过 250,000，已自动切换为 SVG 导出。');
                    downloadSVG(currentGridData);
                    return;
                }

                if (total <= 10000) {
                    downloadHighResPNG(currentGridData);
                } else {
                    modalBeadCount.textContent = total;
                    exportModal.classList.add('show');
                }
            }

            // ---------- 主流程 ----------
            function handleGenerate() {
                if (isGenerating) return;
                if (!uploadedImage) {
                    alert('请先上传一张图片！');
                    return;
                }

                const rows = parseInt(rowsInput.value, 10);
                const cols = parseInt(colsInput.value, 10);
                if (isNaN(rows) || rows < 1 || isNaN(cols) || cols < 1) {
                    alert('行数和列数必须为正整数！');
                    return;
                }

                const total = rows * cols;

                if (total > 25000) {
                    alert('当前数量超过 250,00，生成后将只能导出 SVG 格式。');
                }

                if (total > 90000) {
                    if (!confirm(`您设置的网格为 ${rows}×${cols} (共 ${total} 个格子)，数量极大，可能影响性能，确定继续吗？`)) {
                        return;
                    }
                }

                const precision = precisionSelect.value;
                const quantLevels = getQuantizationLevels(precision);

                isGenerating = true;
                generateBtn.disabled = true;
                generateBtn.textContent = '生成中...';
                downloadBtn.disabled = true;

                setTimeout(() => {
                    try {
                        const gridData = generateGridData(uploadedImage, rows, cols, quantLevels);
                        currentGridData = gridData;
                        renderGrid(gridData, currentZoom);
                        // 缩放已包含在 renderGrid 中，无需额外调用
                    } catch (err) {
                        console.error(err);
                        alert('生成图纸失败：' + err.message);
                        isGenerating = false;
                        generateBtn.disabled = false;
                        generateBtn.textContent = '生成图纸';
                        downloadBtn.disabled = false;
                    }
                }, 50);
            }

            function applyZoom(zoomPercent) {
                if (!currentGridData) return;
                renderGrid(currentGridData, zoomPercent);
            }

            // ---------- 图片上传 ----------
            function handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请上传图片文件！');
                    fileInput.value = '';
                    return;
                }

                fileName.textContent = file.name.length > 20 ? file.name.slice(0, 18) + '…' : file.name;

                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        uploadedImage = img;
                        imageAspectRatio = (img.naturalWidth || img.width) / (img.naturalHeight || img.height);
                        previewImg.src = ev.target.result;
                        previewImg.style.display = 'block';
                        previewPlaceholder.style.display = 'none';
                        imageInfo.textContent = `${img.naturalWidth || img.width} × ${img.naturalHeight || img.height}`;
                        clearGrid();
                    };
                    img.onerror = function() {
                        alert('图片加载失败，请尝试其他图片。');
                        uploadedImage = null;
                        fileName.textContent = '未选择';
                        previewImg.style.display = 'none';
                        previewPlaceholder.style.display = 'block';
                        imageInfo.textContent = '';
                    };
                    img.src = ev.target.result;
                };
                reader.onerror = function() {
                    alert('读取文件失败，请重试。');
                };
                reader.readAsDataURL(file);
            }

            function clearGrid() {
                gridContainer.innerHTML = '';
                const clone = gridPlaceholder.cloneNode(true);
                clone.style.display = 'flex';
                gridContainer.appendChild(clone);
                legendItems.innerHTML = '<span style="color:#b8add6;font-size:14px;padding:6px 0;">暂无数据，生成图纸后显示</span>';
                legendCount.textContent = '(0 种颜色)';
                currentGridData = null;
                downloadBtn.disabled = true;
                beadCountSpan.textContent = '0';
                zoomWarning.classList.remove('show');
            }

            // ---------- 锁定比例 ----------
            function updateDimension(trigger) {
                if (!isLocked || !uploadedImage) return;
                const rowsVal = parseInt(rowsInput.value, 10);
                const colsVal = parseInt(colsInput.value, 10);
                if (isNaN(rowsVal) || rowsVal < 1 || isNaN(colsVal) || colsVal < 1) return;
                if (trigger === 'rows') {
                    let newCols = Math.round(rowsVal * imageAspectRatio);
                    if (newCols < 1) newCols = 1;
                    colsInput.value = newCols;
                } else if (trigger === 'cols') {
                    let newRows = Math.round(colsVal / imageAspectRatio);
                    if (newRows < 1) newRows = 1;
                    rowsInput.value = newRows;
                }
            }

            rowsInput.addEventListener('input', function() { updateDimension('rows'); });
            colsInput.addEventListener('input', function() { updateDimension('cols'); });

            lockBtn.addEventListener('click', function() {
                isLocked = !isLocked;
                this.textContent = isLocked ? '比例已锁定' : '>锁定比例';
                this.classList.toggle('active', isLocked);
                if (isLocked && uploadedImage) {
                    updateDimension('rows');
                }
            });

            // ---------- 缩放滑块 ----------
            zoomSlider.addEventListener('input', function() {
                const val = parseInt(this.value, 10);
                zoomValue.textContent = val + '%';
                currentZoom = val;
                if (currentGridData) applyZoom(val);
            });

            // ---------- 事件绑定 ----------
            fileInput.addEventListener('change', handleFileUpload);
            generateBtn.addEventListener('click', handleGenerate);
            downloadBtn.addEventListener('click', handleExport);

            rowsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleGenerate(); });
            colsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleGenerate(); });
            precisionSelect.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleGenerate(); });

            modalSvgBtn.addEventListener('click', function() {
                exportModal.classList.remove('show');
                if (currentGridData) downloadSVG(currentGridData);
            });
            modalTilesBtn.addEventListener('click', function() {
                exportModal.classList.remove('show');
                if (currentGridData) downloadTiles(currentGridData);
            });
            modalCancelBtn.addEventListener('click', function() {
                exportModal.classList.remove('show');
            });
            exportModal.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('show');
            });

            downloadBtn.disabled = true;

            // roundRect polyfill
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                    const r = typeof radii === 'number' ? radii : (radii || 0);
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    this.closePath();
                    return this;
                };
            }

            console.log('拼豆图纸工具已加载 · MARD 221色支持 (纯Canvas渲染)');
        })();
    </script>
</body>
</html>
